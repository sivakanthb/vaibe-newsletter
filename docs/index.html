<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vAibe — Weekly AI Newsletter</title>
<style>
/* ── Reset + Base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
}
a { color: #00f0ff; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Animated BG ──────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(88, 28, 135, 0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
}

/* ── Header ───────────────────────────────────────── */
.header {
  text-align: center;
  padding: 1rem 1rem 0.5rem;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
}
.logo {
  font-size: 2.8rem;
  font-weight: 800;
  letter-spacing: 2px;
}
.logo-v { color: #ffffff; }
.logo-ai { color: #00f0ff; text-shadow: 0 0 20px rgba(0, 240, 255, 0.5), 0 0 40px rgba(0, 240, 255, 0.2); }
.logo-be { color: #ffffff; }
.tagline {
  margin-top: 0.3rem;
  font-size: 0.95rem;
  color: #777;
  font-style: italic;
}
.nav-links {
  margin-top: 0.8rem;
  display: flex;
  justify-content: center;
  gap: 2rem;
}
.nav-links a {
  color: #888;
  font-size: 0.9rem;
  transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: #00f0ff; text-decoration: none; }

/* ── Issue Header ─────────────────────────────────── */
.issue-header {
  text-align: center;
  padding: 0.4rem 1rem 0.4rem;
}
.issue-badge {
  display: inline-block;
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  padding: 0.25rem 0.8rem;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #fff;
}
.issue-title {
  margin-top: 0.5rem;
  font-size: 1.5rem;
  font-weight: 700;
  color: #fff;
}
.issue-date {
  margin-top: 0.2rem;
  color: #777;
  font-size: 0.85rem;
}

/* ── Mascot (inline with header) ──────────────────── */
.mascot {
  width: 52px;
  height: 52px;
  animation: float 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* ── Cards Grid ───────────────────────────────────── */
.cards-grid {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0.5rem 1rem 1rem;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1rem;
}

/* ── Base Card ────────────────────────────────────── */
.card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  padding: 1.4rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
}
.card-type {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #666;
  margin-bottom: 0.8rem;
}
.card-emoji {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}
.card h3 {
  font-size: 1.2rem;
  color: #fff;
  margin-bottom: 0.6rem;
  line-height: 1.3;
}
.card p {
  color: #aaa;
  line-height: 1.6;
  font-size: 0.95rem;
}
.card-source {
  margin-top: 1rem;
  font-size: 0.75rem;
  color: #555;
}

/* ── Stat Bomb Card ───────────────────────────────── */
.card-stat .stat-number {
  font-size: 3.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, #00f0ff, #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}
.card-stat .stat-label {
  font-size: 1rem;
  color: #aaa;
  margin-top: 0.3rem;
}

/* ── VS Battle Card ───────────────────────────────── */
.vs-container {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 0.8rem 0;
}
.vs-side {
  flex: 1;
  text-align: center;
}
.vs-name {
  font-weight: 700;
  font-size: 1rem;
  color: #fff;
  margin-bottom: 0.4rem;
}
.vs-bar {
  height: 8px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.1);
  overflow: hidden;
}
.vs-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1.5s ease-out;
}
.vs-bar-fill.left { background: linear-gradient(90deg, #00f0ff, #7c3aed); }
.vs-bar-fill.right { background: linear-gradient(90deg, #ec4899, #f59e0b); }
.vs-score {
  font-size: 0.85rem;
  color: #888;
  margin-top: 0.3rem;
}
.vs-badge {
  font-size: 1.8rem;
  font-weight: 900;
  color: #7c3aed;
}

/* ── Timeline Card ────────────────────────────────── */
.timeline {
  display: flex;
  gap: 0;
  margin: 1rem 0;
  position: relative;
}
.timeline::before {
  content: '';
  position: absolute;
  top: 24px;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, #7c3aed, #00f0ff);
  z-index: 0;
}
.timeline-item {
  flex: 1;
  text-align: center;
  position: relative;
  z-index: 1;
}
.timeline-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #00f0ff;
  margin: 18px auto 8px;
  box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
}
.timeline-year {
  font-weight: 700;
  font-size: 0.85rem;
  color: #fff;
}
.timeline-emoji {
  font-size: 1.5rem;
  margin-bottom: 2px;
}
.timeline-desc {
  font-size: 0.7rem;
  color: #888;
  margin-top: 4px;
  line-height: 1.3;
}

/* ── Quote Card ───────────────────────────────────── */
.card-quote .quote-text {
  font-size: 1.1rem;
  font-style: italic;
  color: #ccc;
  border-left: 3px solid #7c3aed;
  padding-left: 1rem;
  line-height: 1.6;
}
.card-quote .quote-author {
  margin-top: 0.8rem;
  font-size: 0.85rem;
  color: #888;
}

/* ── Fun Fail Card ────────────────────────────────── */
.card-fail {
  border-color: rgba(236, 72, 153, 0.2);
}
.card-fail .fail-scene {
  background: rgba(236, 72, 153, 0.05);
  border-radius: 12px;
  padding: 1.2rem;
  text-align: center;
  margin: 0.8rem 0;
  font-size: 3rem;
}

/* ── Hidden Gem Card ──────────────────────────────── */
.card-gem {
  border-color: rgba(245, 158, 11, 0.2);
}
.gem-stars {
  color: #f59e0b;
  font-size: 0.85rem;
  margin-top: 0.5rem;
}
.gem-tag {
  display: inline-block;
  background: rgba(245, 158, 11, 0.15);
  color: #f59e0b;
  padding: 0.2rem 0.6rem;
  border-radius: 8px;
  font-size: 0.75rem;
  margin-top: 0.5rem;
  margin-right: 0.3rem;
}

/* ── Mini Infographic ─────────────────────────────── */
.bar-chart {
  margin: 1rem 0;
}
.bar-row {
  display: flex;
  align-items: center;
  margin-bottom: 0.6rem;
  gap: 0.8rem;
}
.bar-label {
  width: 100px;
  font-size: 0.8rem;
  color: #aaa;
  text-align: right;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 22px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 11px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 11px;
  transition: width 1.5s ease-out;
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 0.7rem;
  font-weight: 700;
  color: #fff;
}

/* ── Footer ───────────────────────────────────────── */
.footer {
  text-align: center;
  padding: 1.5rem 1rem;
  color: #555;
  font-size: 0.8rem;
  margin-top: 0.5rem;
}
.footer .logo-mini {
  font-size: 1rem;
  font-weight: 800;
  margin-bottom: 0.3rem;
}

/* ── Responsive ───────────────────────────────────── */
@media (max-width: 700px) {
  .logo { font-size: 2.5rem; }
  .cards-grid { grid-template-columns: 1fr; padding: 0.8rem; }
  .card { padding: 1.1rem; }
  .card-stat .stat-number { font-size: 2.5rem; }
  .timeline { flex-wrap: wrap; }
  .timeline::before { display: none; }
  .timeline-item { flex: 0 0 50%; margin-bottom: 1rem; }
}

/* ── Animations ───────────────────────────────────── */
.card { opacity: 0; transform: translateY(20px); animation: cardIn 0.5s ease forwards; }
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.5s; }
.card:nth-child(6) { animation-delay: 0.6s; }
.card:nth-child(7) { animation-delay: 0.7s; }
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

/* ── Counter animation ────────────────────────────── */
@keyframes pulse-glow {
  0%, 100% { text-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
  50% { text-shadow: 0 0 40px rgba(0, 240, 255, 0.6), 0 0 60px rgba(124, 58, 237, 0.3); }
}
.stat-number { animation: pulse-glow 3s ease-in-out infinite; }

/* ── Full-width card span ─────────────────────────── */
.card-full { grid-column: 1 / -1; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-row">
    <svg class="mascot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="25" y="35" width="50" height="45" rx="10" fill="#1a1a3e" stroke="#00f0ff" stroke-width="2"/>
      <rect x="30" y="10" width="40" height="30" rx="8" fill="#1a1a3e" stroke="#00f0ff" stroke-width="2"/>
      <circle cx="42" cy="25" r="5" fill="#00f0ff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="58" cy="25" r="5" fill="#00f0ff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3s" repeatCount="indefinite" begin="0.1s"/></circle>
      <line x1="50" y1="10" x2="50" y2="2" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="50" cy="2" r="3" fill="#7c3aed"><animate attributeName="fill" values="#7c3aed;#00f0ff;#7c3aed" dur="2s" repeatCount="indefinite"/></circle>
      <path d="M 40 30 Q 50 36 60 30" stroke="#00f0ff" stroke-width="1.5" fill="none"/>
      <line x1="25" y1="50" x2="15" y2="60" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="75" y1="50" x2="85" y2="42" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"><animate attributeName="y2" values="42;38;42" dur="1.5s" repeatCount="indefinite"/></line>
      <line x1="38" y1="80" x2="35" y2="95" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="62" y1="80" x2="65" y2="95" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="50" cy="55" r="6" fill="none" stroke="#ec4899" stroke-width="1.5"><animate attributeName="r" values="6;7;6" dur="1.5s" repeatCount="indefinite"/></circle>
    </svg>
    <div class="logo">
      <span class="logo-v">v</span><span class="logo-ai">Ai</span><span class="logo-be">be</span>
    </div>
  </div>
  <div class="tagline">Your weekly dose of AI surprises</div>
  <nav class="nav-links">
    <a href="index.html" class="active">Latest Issue</a>
    <a href="vault.html">The Vault</a>
  </nav>
</header>

<!-- Issue content rendered here -->
<div id="issue-header" class="issue-header"></div>
<div id="cards-grid" class="cards-grid"></div>

<!-- Footer -->
<footer class="footer">
  <div class="logo-mini"><span class="logo-v">v</span><span class="logo-ai">Ai</span><span class="logo-be">be</span></div>
  <p>© 2026 vAibe · <a href="vault.html">Browse The Vault</a></p>
  <p style="margin-top: 0.3rem;">Built by <a href="https://sivakanth.vercel.app" target="_blank" rel="noopener noreferrer">Sivakanth Badigenchala</a></p>
</footer>

<script>
// ── Card Renderers ───────────────────────────────────
const renderers = {
  'stat-bomb': (c) => `
    <div class="card card-stat card-full">
      <div class="card-type">🤯 Mind-Blowing Stat</div>
      <div class="stat-number">${c.headline}</div>
      <div class="stat-label">${c.body}</div>
      ${c.source ? `<div class="card-source">Source: ${c.source}</div>` : ''}
    </div>`,

  'timeline': (c) => `
    <div class="card card-full">
      <div class="card-type">📜 On This Week in AI History</div>
      <h3>${c.headline}</h3>
      <div class="timeline">
        ${c.events.map(e => `
          <div class="timeline-item">
            <div class="timeline-emoji">${e.emoji}</div>
            <div class="timeline-dot"></div>
            <div class="timeline-year">${e.year}</div>
            <div class="timeline-desc">${e.text}</div>
          </div>`).join('')}
      </div>
    </div>`,

  'vs-battle': (c) => `
    <div class="card">
      <div class="card-type">⚔️ VS Battle</div>
      <h3>${c.headline || ''}</h3>
      <div class="vs-container">
        <div class="vs-side">
          <div class="vs-name">${c.left.name}</div>
          <div class="vs-bar"><div class="vs-bar-fill left" style="width:${c.left.score}%"></div></div>
          <div class="vs-score">${c.left.score}%</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="vs-side">
          <div class="vs-name">${c.right.name}</div>
          <div class="vs-bar"><div class="vs-bar-fill right" style="width:${c.right.score}%"></div></div>
          <div class="vs-score">${c.right.score}%</div>
        </div>
      </div>
      <p>${c.body || ''}</p>
    </div>`,

  'quote': (c) => `
    <div class="card card-quote card-full">
      <div class="card-type">💬 Wise Words</div>
      <div class="quote-text">"${c.body}"</div>
      <div class="quote-author">— ${c.author}</div>
    </div>`,

  'fun-fail': (c) => `
    <div class="card card-fail">
      <div class="card-type">😂 AI Fail of the Week</div>
      <div class="fail-scene">${c.emoji || '🤖💥'}</div>
      <h3>${c.headline}</h3>
      <p>${c.body}</p>
    </div>`,

  'hidden-gem': (c) => `
    <div class="card card-gem">
      <div class="card-type">💎 Hidden Gem</div>
      <h3>${c.headline}</h3>
      <p>${c.body}</p>
      ${c.tags ? c.tags.map(t => `<span class="gem-tag">${t}</span>`).join('') : ''}
      ${c.stars ? `<div class="gem-stars">${'★'.repeat(c.stars)}${'☆'.repeat(5 - c.stars)}</div>` : ''}
      ${c.url ? `<div class="card-source"><a href="${c.url}" target="_blank">Check it out →</a></div>` : ''}
    </div>`,

  'infographic': (c) => `
    <div class="card">
      <div class="card-type">📊 By The Numbers</div>
      <h3>${c.headline}</h3>
      <div class="bar-chart">
        ${c.bars.map((b, i) => {
          const colors = ['#00f0ff', '#7c3aed', '#ec4899', '#f59e0b', '#10b981'];
          return `
          <div class="bar-row">
            <div class="bar-label">${b.label}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${b.value}%; background:${colors[i % colors.length]}">${b.value}%</div>
            </div>
          </div>`;
        }).join('')}
      </div>
      ${c.body ? `<p>${c.body}</p>` : ''}
    </div>`,
};

// ── Load + Render Latest Issue ───────────────────────
async function loadLatest() {
  try {
    const idx = await fetch('data/issues.json').then(r => r.json());
    if (!idx.issues || idx.issues.length === 0) { showEmpty(); return; }
    const latest = idx.issues[idx.issues.length - 1];
    const issue = await fetch(`data/issues/${latest.file}`).then(r => r.json());
    renderIssue(issue);
  } catch (err) {
    console.error('Failed to load issue:', err);
    showEmpty();
  }
}

function renderIssue(issue) {
  document.getElementById('issue-header').innerHTML = `
    <span class="issue-badge">Issue #${issue.id} ${issue.id === 1 ? '· Premiere' : ''}</span>
    <h1 class="issue-title">${issue.title}</h1>
    <div class="issue-date">${new Date(issue.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
  `;
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = issue.cards.map(c => {
    const renderer = renderers[c.type];
    return renderer ? renderer(c) : `<div class="card"><p>${JSON.stringify(c)}</p></div>`;
  }).join('');
}

function showEmpty() {
  document.getElementById('issue-header').innerHTML = `
    <span class="issue-badge">Coming Soon</span>
    <h1 class="issue-title">First Issue Dropping Soon!</h1>
    <div class="issue-date">Stay tuned — the robot is gathering intel...</div>
  `;
}

loadLatest();
</script>
</body>
</html>
